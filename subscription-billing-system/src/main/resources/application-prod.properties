# =========================================
# PRODUCTION ENVIRONMENT CONFIGURATION
# =========================================

spring.application.name=subscription-billing-system-prod


# =========================================
# SERVER PORT
# =========================================

server.port=8080


# =========================================
# MYSQL DATABASE CONFIGURATION
# =========================================

spring.datasource.url=jdbc:mysql://localhost:3306/subscription_prod_db

spring.datasource.username=root

spring.datasource.password=Nani123@

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=false

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# =========================================
# CONNECTION POOL SETTINGS
# =========================================

spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.idle-timeout=30000


# =========================================
# SWAGGER CONFIGURATION
# =========================================

springdoc.api-docs.enabled=true

springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html


# =========================================
# JWT CONFIGURATION
# =========================================

jwt.secret=prodsecretkey

jwt.expiration=3600000


# =========================================
# LOGGING
# =========================================

logging.level.root=INFO

logging.level.org.springframework=WARN

logging.level.com.billing.system=INFO


# =========================================
# FILE UPLOAD CONFIGURATION
# =========================================

spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=20MB