# =========================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# =========================================

spring.application.name=subscription-billing-system-dev


# =========================================
# SERVER PORT
# =========================================

server.port=8081


# =========================================
# MYSQL DATABASE CONFIGURATION
# =========================================

spring.datasource.url=jdbc:mysql://localhost:3306/subscription_dev_db

spring.datasource.username=root

spring.datasource.password=Nani123@

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================================
# JPA / HIBERNATE CONFIGURATION
# =========================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# =========================================
# SWAGGER CONFIGURATION
# =========================================

springdoc.api-docs.enabled=true

springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html


# =========================================
# JWT CONFIGURATION
# =========================================

jwt.secret=devsecretkey

jwt.expiration=3600000


# =========================================
# LOGGING
# =========================================

logging.level.org.springframework=DEBUG

logging.level.com.billing.system=DEBUG


# =========================================
# FILE UPLOAD CONFIGURATION
# =========================================

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB